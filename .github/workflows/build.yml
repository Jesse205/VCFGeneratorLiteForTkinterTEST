name: Build

on:
  workflow_dispatch:
    inputs:
      build-windows-installer:
        description: Build Windows Installer
        type: boolean
        default: true
      build-windows-portable:
        description: Build Windows Portable
        type: boolean
        default: true
      build-python3-zipapp:
        description: Build Python 3 Zip Application
        type: boolean
        default: true
      build-python3-wheel:
        description: Build Python 3 Wheel
        type: boolean
        default: true
  workflow_call:
    inputs:
      build-windows-installer:
        description: Build Windows Installer
        type: boolean
        default: false
      build-windows-portable:
        description: Build Windows Portable
        type: boolean
        default: false
      build-python3-zipapp:
        description: Build Python 3 Zip Application
        type: boolean
        default: false
      build-python3-wheel:
        description: Build Python 3 Wheel
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-windows-installer:
    if: ${{ inputs.build-windows-installer }}
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      UV_NO_DEFAULT_GROUPS: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Build Portable Package
        run: uv run --group build --group basic poe build-installer

      - name: Upload Package
        id: upload-package
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: dist/*-setup.exe
          if-no-files-found: error

  build-windows-portable:
    if: ${{ inputs.build-windows-portable }}
    name: Build Windows Portable Package
    runs-on: windows-latest
    env:
      UV_NO_DEFAULT_GROUPS: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Build Portable Package
        run: uv run --group build --group basic poe build-portable

      - name: Upload Package
        id: upload-package
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: dist/*-portable.zip
          if-no-files-found: error

  build-python3-zipapp:
    if: ${{ inputs.build-python3-zipapp }}
    name: Build Python 3 Zip Application
    runs-on: ubuntu-latest
    env:
      UV_NO_DEFAULT_GROUPS: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Build Zipapp
        run: uv run  --group build --group basic poe build-zipapp

      - name: Upload Package
        id: upload-package
        uses: actions/upload-artifact@v7
        with:
          name: python3-zipapp
          path: dist/*.pyzw
          if-no-files-found: error

  build-python3-wheel:
    if: ${{ inputs.build-python3-wheel }}
    name: Build Python 3 Wheel
    runs-on: ubuntu-latest
    env:
      UV_NO_DEFAULT_GROUPS: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Build Wheel
        run: uv run --group build --group basic poe build-wheel

      - name: Upload Wheel
        id: upload-wheel
        uses: actions/upload-artifact@v7
        with:
          name: python3-wheel
          path: dist/*.whl
          if-no-files-found: error
