app_name = "VCF 生成器 Lite"
button_ok = "确定"

[app]
name = "VCF 生成器 Lite"
description = "将联系人列表转换为单个 vCard 文件。"

[startup]
source_tip = "💡提示：源码已托管到 {url}"

[main_window]
button_generate = "开始生成"
button_stop = "停止"

label_generating = "正在生成……"
label_stopping = "正在停止……"

menu_file = "文件(&F)"
menu_file_generate = "生成文件(&G)…"
menu_file_stop_generation = "停止生成(&S)"
menu_file_exit = "退出(&X)"

menu_edit = "编辑(&E)"
menu_edit_undo = "撤销(&U)"
menu_edit_redo = "重做(&R)"
menu_edit_cut = "剪切(&T)"
menu_edit_copy = "复制(&C)"
menu_edit_paste = "粘贴(&P)"
menu_edit_select_all = "全选(&A)"
menu_edit_clean_quotes = "删除引号(&Q)"

menu_help = "帮助(&H)"
menu_help_repository = "项目仓库(&O)"
menu_help_release = "版本发布(&R)"
menu_help_feedback = "提交反馈(&F)"
menu_help_contact = "联系作者(&C)"
menu_help_license = "许可协议(&L)"
menu_help_os_notices = "开源声明(&N)"
menu_help_about = "关于 VCF 生成器 Lite(&A)"

input_example = """张三\t13345367789\t著名的法外狂徒
李四\t13445467890
王五\t13554678907
赵六\t13645436748
"""

usage = """使用说明：
1. 把名字和电话以每行“姓名 电话 备注”（备注可忽略）的格式复制到下面的编辑框内。
2. 点击“生成”，选择一个路径保存文件。
3. 您可以将生成后的 vCard 文件用在您需要的地方，例如导入到手机或者邮箱。"""

[save_vcf_window]
title = "选择文件保存位置"
label_type_vcf = "vCard 文件 (*.vcf)"

[save_vcf_permission_denied_message_box]
title = "保存失败"
message = "权限被拒，请授予权限后再试。"

[save_vcf_os_error_message_box]
title = "保存失败"
message = "系统错误：{reason}"

[vcf_generate_success_message_box]
title = "生成 vCard 文件成功"
message = "已导出文件到 {path}。"
detail = """名片数量：{total}
消耗时间：{time} 秒"""

[vcf_generate_error_message_box]
title = "生成 vCard 文件失败"
message = "生成 vCard 文件时出现未知异常：\n\n{content}"

[vcf_generating_exit_message_box]
title = "正在生成 vCard 文件"
message = "请等待文件生成完成"

[vcf_generate_invalid_dialog]
title = "生成 vCard 文件完成"
message = "已导出文件到 {path}，异常的号码已被忽略。"
label_invalid_numbers = "异常的号码："
heading_row = "位置"
heading_original = "原始内容"
heading_reason = "原因"
cell_row = "第 {row} 行"
exception_phone_not_found = "未找到号码"

[about_message_box]
title = "关于 VCF 生成器 Lite"
message = "VCF 生成器 Lite v{version}"
detail = """{copyright}

环境信息：
Python：{python_info}
Tcl：{tcl_info}
Tk：{tk_info}"""

[open_url_failure_message_box]
title = "打开外部应用失败"
message = "无法打开外部应用，请检查默认应用设置。"
detail = """链接：{url}"""

[entry_widget]
menu_undo = "撤销(&U)"
menu_redo = "重做(&R)"
menu_cut = "剪切(&T)"
menu_copy = "复制(&C)"
menu_paste = "粘贴(&P)"
menu_delete = "删除(&D)"
menu_select_all = "全选(&A)"
