[common]
button_ok = "OK"

[app]
name = "VCF Generator Lite"
description = "Makes one vCard from a contact list."

[startup]
source_tip = "💡Tip: Source code is hosted at {url}"

[main_window]
button_generate = "Generate"
button_stop = "Stop"

label_generating = "Generating..."
label_stopping = "Stopping..."

menu_file = "&File"
menu_file_generate = "&Generate file..."
menu_file_stop_generation = "&Stop generation"
menu_file_exit = "E&xit"

menu_edit = "&Edit"
menu_edit_undo = "&Undo"
menu_edit_redo = "&Redo"
menu_edit_cut = "Cu&t"
menu_edit_copy = "&Copy"
menu_edit_paste = "&Paste"
menu_edit_select_all = "Select &All"
menu_edit_clean_quotes = "Remove &Quotes"

menu_help = "&Help"
menu_help_repository = "Rep&ository"
menu_help_release = "&Releases"
menu_help_feedback = "&Feedback"
menu_help_contact = "&Contact author"
menu_help_license = "&License"
menu_help_os_notices = "Open Source &Notices"
menu_help_about = "&About VCF Generator Lite"

input_example = """John\t13345367789\tA famous scientist
Jane\t13445467890
Mike\t13554678907
Alex\t13645436748
"""

usage = """Instructions:
1. Copy names and phone numbers in the format "Name Phone Notes" (notes optional) into the edit box below.
2. Click "Generate" and select a path to save the file.
3. You can use the generated vCard file wherever you need it, such as importing it into your phone or email."""

[save_vcf_window]
title = "Select File Save Location"
label_type_vcf = "vCard File (*.vcf)"
default_file_name = "My Contacts.vcf"

[save_vcf_permission_denied_message_box]
title = "Save Failed"
message = "Permission denied, please grant permission again."

[save_vcf_os_error_message_box]
title = "Save Failed"
message = "System error: {reason}"

[vcf_generate_success_message_box]
title = "vCard File Generated Successfully"
message = "File exported to {path}."
detail = """Number of contacts: {total}
Time elapsed: {time} seconds"""

[vcf_generate_error_message_box]
title = "Failed to Generate vCard File"
message = "An unknown error occurred while generating the vCard file:\n\n{content}"

[vcf_generating_exit_message_box]
title = "Generating vCard File"
message = "Please wait for the file generation to complete"

[vcf_generate_invalid_window]
title = "vCard File Generation Complete"
message = "File exported to {path}, invalid numbers have been ignored."
label_invalid_numbers = "Invalid numbers: "
heading_row = "Position"
heading_original = "Original Content"
heading_reason = "Reason"
cell_row = "Row {row}"

[about_message_box]
title = "About VCF Generator Lite"
message = "VCF Generator Lite v{version}"
detail = """{copyright}

Environment Information:
Python: {python_info}
Tcl: {tcl_info}
Tk: {tk_info}"""

[open_url_failure_message_box]
title = "Failed to Open External Application"
message = "Failed to open external application. Please check your default application settings."
detail = """Link: {url}"""

[entry_widget]
menu_undo = "&Undo"
menu_redo = "&Redo"
menu_cut = "Cu&t"
menu_copy = "&Copy"
menu_paste = "&Paste"
menu_delete = "&Delete"
menu_select_all = "Select &All"

[cli]
help_option_verbose = "Show details"
help_option_quiet = "Quiet mode"

[exception]
phone_not_found = "Phone number not found"
